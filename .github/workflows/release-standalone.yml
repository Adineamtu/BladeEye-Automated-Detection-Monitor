name: Build Standalone Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libfftw3-dev libbladerf-dev libgtk-3-dev libwebkit2gtk-4.1-dev libasound2-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone package
        run: python app_wrapper/build_standalone.py

      # --- ACESTA ESTE PASUL NOU CARE LIPSEA ---
      - name: Prepare Artifacts for Release
        run: |
          # Verificăm unde a pus PyInstaller fișierele (de obicei în app_wrapper/dist)
          # Creăm arhiva din conținutul folderului dist
          if [ -d "app_wrapper/dist" ]; then
            cd app_wrapper/dist && tar -czvf ../../reactive_jam_standalone.tar.gz .
          elif [ -d "dist" ]; then
            cd dist && tar -czvf ../reactive_jam_standalone.tar.gz .
          else
            echo "EROARE: Folderul dist nu a fost gasit!"
            exit 1
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reactive_jam_standalone.tar.gz
